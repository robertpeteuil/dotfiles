- defaults:
    link:
      create: true
      relink: true
      force: true
 
- link:
    ~/.gitconfig:
      path: development/git/gitconfig
    ~/.gitconfig_pers:
      path: development/git/gitconfig_pers
    ~/.gitignore_global:
      path: development/git/gitignore_global
    ~/.hgignore_global:
      path: development/git/hgignore_global
