# .tmux.conf


### GENERAL
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
bind r source-file ~/.tmux.conf \; display "Reloaded!"
set -g history-limit 10000
set-option -g focus-events on
# terminal progress-bar passthru
set-option -g allow-passthrough on
# set extended-keys for pi agent framework
# set -g extended-keys-format csi-u
# set -g extended-keys on


### COPY MODE
setw -g mode-keys vi
# vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle


### POPUPS
bind -n M-G display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind -n M-s display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "$SHELL"
# special popup for yazi to prevent tmux crash
#   source: https://github.com/sxyazi/yazi/issues/2308
bind -n M-y display-popup -d '#{pane_current_path}' -h 90% -w 90% -E 'tmux new-session yazi \; set status off'


### FINGERS
#     "https://github.com/Morantron/tmux-fingers"
set -g @fingers-keyboard-layout 'qwerty-left-hand'
set -g @fingers-hint-style 'bg=green,bright'
set -g @fingers-highlight-style 'fg=yellow'
set -g @fingers-enable-bindings off
# Start fingers with Alt+f
bind -n M-f run -b "#{@fingers-cli} start #{pane_id}"
# Start fingers in open-mode with Alt+F
bind -n M-F run -b "#{@fingers-cli} start #{pane_id} --main-action ':open:'"


### STATUS BAR
set -g status-position top
set -g status-interval 15
# theme settings
set -g @theme_plugin_datetime_icon ' '
set -g @theme_plugins 'datetime'
set -g @theme_plugin_datetime_format ' %m/%d/%Y %H:%M '
set -g @theme_transparent_status_bar 'true'
# up-sloping separators
set -g @theme_left_separator ''
set -g @theme_right_separator ''
set -g @theme_transparent_left_separator_inverse ''
set -g @theme_transparent_right_separator_inverse ''
set -g @theme_session_icon ' '
# set -g @theme_host_icon ' '
set -g @theme_host_icon '󰒋 '
set -g @theme_plugin_active_window_icon ' '
set -g @theme_plugin_inactive_window_icon ' '
# down-sloping separators
# set -g @theme_left_separator ''
# set -g @theme_right_separator ''
# set -g @theme_transparent_left_separator_inverse ''
# set -g @theme_transparent_right_separator_inverse ''


### REMAP PREFIX - to prevent conflicts with Vim
#    https://superuser.com/questions/382102/using-tmux-with-both-emacs-and-vim
unbind-key 'C-b'
unbind 'C-Space'
set-option -g prefix 'C-Space'
# alternative prefix
set-option -g prefix2 'C-\'
bind 'C-Space' send-prefix


### WINDOW HOTKEYS
bind c 'new-window -c "#{pane_current_path}"'       # new window with same path
bind | 'split-window -h -c "#{pane_current_path}"'
bind - 'split-window -v -c "#{pane_current_path}"'
# switch between windows/sessions
bind 1 'select-window -t1'
bind 2 'select-window -t2'
bind 3 'select-window -t3'
bind 4 'select-window -t4'
bind 5 'select-window -t5'
bind \` 'switch-client -t"{marked}"'  # jump to marked window
bind Space 'last-window'              # toggle to previous window
bind-key 'C-\' 'switch-client -l'     # toggle to previous session
# swap windows
bind -r "<" swap-window -t -1
bind -r ">" swap-window -t +1


### WINDOW RENUMBERING
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


### PANES
# join pane
bind j choose-window 'join-pane -h -l 40% -s "%%"'   # horizontally
bind J choose-window 'join-pane -s "%%"'      # vertically
# bind-key j command-prompt -p "Join pane from:" "join-pane -h -s '%%'"
# bind-key s command-prompt -p "send pane to:"  "join-pane -t '%%'"
# resizing
#   up/down: 5 lines with Meta, 1 line with Ctrl
bind-key -r -T prefix       M-k              resize-pane -U 5
bind-key -r -T prefix       M-j              resize-pane -D 5
bind-key -r -T prefix       C-k              resize-pane -U 1
bind-key -r -T prefix       C-j              resize-pane -D 1
#   right/left: 10 columns with Meta, 5 columns with Ctrl
bind-key -r -T prefix       M-h              resize-pane -L 10
bind-key -r -T prefix       M-l              resize-pane -R 10
bind-key -r -T prefix       C-h              resize-pane -L 5
bind-key -r -T prefix       C-l              resize-pane -R 5
#   flipp orientation of current pane with pane <arrow-way>-of
bind -n S-Up move-pane -h -t '.{up-of}'
bind -n S-Right move-pane -t '.{right-of}'
bind -n S-Left move-pane -t '.{left-of}'
bind -n S-down move-pane -h -t '.{down-of}'

### SMART PANE SWITCHING
#   with awareness of Vim splits
#   See: https://github.com/christoomey/vim-tmux-navigator

# decide whether we're in a Vim process
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf|ssh|mosh)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l


### PLUGINS
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @plugin 'robertpeteuil/tmux-tokyo-night'
set -g @plugin 'Morantron/tmux-fingers'

# Initialize TMUX plugin manager
setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# Manually download tmux-theme in case tpm fails (on hosts without modern bash)
if "test ! -d ~/.tmux/plugins/tmux-tokyo-night/" \
   "run 'git clone https://github.com/robertpeteuil/tmux-tokyo-night ~/.tmux/plugins/tmux-tokyo-night'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
