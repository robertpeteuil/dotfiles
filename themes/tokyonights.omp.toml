"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
console_title_template = "{{.PWD}}"
version = 4
final_space = true

[palette]
  black = "#000000"
  black2 = "#111111"
  blue = "#7aa2f7"
  cyan = "#7dcfff"
  green = "#9ece6a"
  green2 = "#41a6b5"
  grey = "#565f89"
  grey2 = "#283457"
  magenta = "#bb9af7"
  magenta2 = "#9d7cd8"
  orange = "#ff9e64"
  purewhite = "#ffffff"
  red = "#f7768e"
  white = "#e4e4e4"
  white2 = "#c0caf5"
  yellow = "#e0af68"
  yellow2 = "#c4a000"

[upgrade]
  source = "cdn"
  interval = "168h"
  auto = false
  notice = false

## LEFT PROMPT
[[blocks]]
  type = "prompt"
  alignment = "left"

  # SESSION
  [[blocks.segments]]
    type = "session"
    template = ' {{ if .SSHSession }} {{ end }}{{ if ne .UserName "robertpeteuil" }}{{ .UserName }}@{{ end }}{{ .HostName }} '
    style = "plain"
    foreground = "p:black"
    background_templates = [
      "{{ if .Root }}p:orange{{ else }}p:magenta{{ end }}"
    ]

  # session trailing character
  [[blocks.segments]]
    type = "text"
    template = ""
    style = "plain"
    foreground_templates = [
      "{{ if .Root }}p:orange{{ else }}p:magenta{{ end }}"
    ]
    background = "p:black"

  # PATH
  [[blocks.segments]]
    type = "path"
    template = "{{ if .Writable }}{{ else }} {{ end }} {{ .Path }} "
    style = "powerline"
    foreground = "p:black"
    background = "p:blue"
    powerline_symbol = ""

    [blocks.segments.options]
      home_icon = "~"
      mixed_threshold = 20
      style = "mixed"

  # GIT
  [[blocks.segments]]
    type = "git"
    template = " {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }} "
    style = "powerline"
    foreground = "p:black"
    background = "p:green"
    background_templates = [
      "{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}",
      "{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}",
      "{{ if gt .Ahead 0 }}p:cyan{{ end }}",
      "{{ if gt .Behind 0 }}p:green{{ end }}"
    ]
    powerline_symbol = ""
    min_width = 70

    [blocks.segments.options]
      branch_icon = ""
      # fetch_stash_count = false
      fetch_status = true
      fetch_upstream_icon = false

  # JJ
  [[blocks.segments]]
    type = "jujutsu"
    template = " 󰜛 {{.ChangeID}}{{if .Working.Changed}}  {{ .Working.String }}{{ end }} "
    style = "powerline"
    foreground = "p:black"
    background = "p:green2"
    powerline_symbol = ""
    min_width = 100

    [blocks.segments.options]
      fetch_status = true

  ## ENVIRONMENTS
  # KUBERNETES
  [[blocks.segments]]
    type = "kubectl"
    template = ' {{ if .Context }}{{ .Context }}{{ end }}{{ if ne .Namespace "default" }} :: {{ .Namespace }}{{ end }}  '
    style = "powerline"
    foreground = "p:purewhite"
    background = "p:magenta2"
    powerline_symbol = ""
    # hide segment by default (enable with 'oh-my-posh toggle kubectl')
    toggled = true
    min_width = 100

    # [blocks.segments.options]
    #   display_context = true
    #   display_namespace = true

  # NODE
  [[blocks.segments]]
    type = "node"
    template = " {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}  "
    style = "powerline"
    foreground = "p:purewhite"
    background = "p:green"
    powerline_symbol = ""
    min_width = 100

    [blocks.segments.options]
      fetch_version = true

  # GO
  [[blocks.segments]]
    type = "go"
    template = " {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}  "
    style = "powerline"
    foreground = "p:black2"
    background = "p:cyan"
    powerline_symbol = ""
    min_width = 100

    [blocks.segments.options]
      fetch_version = true

  # PYTHON
  [[blocks.segments]]
    type = "python"
    template = " {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} | {{ end }}{{ .Full }}{{ end }}  "
    style = "powerline"
    foreground = "p:black2"
    background = "p:green2"
    powerline_symbol = ""
    min_width = 100

    [blocks.segments.options]
      display_mode = "files"
      fetch_virtual_env = true

  # AWS
  [[blocks.segments]]
    type = "aws"
    template = " {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }}  "
    style = "powerline"
    foreground = "p:purewhite"
    background_templates = [
      '{{if contains "default" .Profile}}p:orange{{end}}',
      '{{if contains "jan" .Profile}}p:red{{end}}'
    ]
    powerline_symbol = ""
    min_width = 100

    [blocks.segments.options]
      display_default = false

  ## RIGHT-MOST PORTION OF LEFT PROMPT
  # padding before time/error
  [[blocks.segments]]
    type = "text"
    template = "    "
    style = "plain"
    foreground = "p:white"
    background = "transparent"
    force = true

  # EXECUTION TIME
  [[blocks.segments]]
    type = "executiontime"
    template = "  {{ .FormattedMs }} "
    style = "plain"
    foreground = "p:black"
    background_templates = [
      "{{ if gt .Code 0 }}p:white2{{ else }}p:white2{{ end }}"
    ]
    min_width = 100

    [blocks.segments.options]
      style = "austin"

  # ERROR MESSAGE
  [[blocks.segments]]
    type = "status"
    template = " 󰂭 {{ if gt .Code 0 }}{{ reason .Code }}{{ else }}{{ end }} "
    style = "plain"
    foreground = "p:black"
    background_templates = [
      "{{ if gt .Code 0 }}p:red{{ else }}p:green{{ end }}"
    ]
    min_width = 80

# SECOND PROMPT LINE
[[blocks]]
  type = "prompt"
  alignment = "left"
  newline = true

  [[blocks.segments]]
    type = "text"
    template = ""
    style = "plain"
    foreground_templates = ["{{ if gt .Code 0 }}p:red{{ else }}p:blue{{ end }}"]
